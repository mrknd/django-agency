{% load static %}
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #000;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-box {
            width: 100%;
            max-width: 420px;
            background: #111;
            padding: 36px 32px;
            border-radius: 24px;
            box-shadow: 0 0 40px rgba(255, 47, 109, 0.2);
        }

        .logo {
            text-align: center;
            margin-bottom: 24px;
        }

        .logo img {
            width: 120px;
            height: auto;
            display: inline-block;
            filter: drop-shadow(0 0 10px rgba(255, 47, 109, 0.5));
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 14px;
            width: 100%;
        }

        input,
        button {
            width: 100%;
            display: block;
            margin: 0;
            box-sizing: border-box;
        }

        input {
            height: 52px;
            padding: 0 16px;
            border-radius: 12px;
            border: none;
            background: #222;
            color: #fff;
            font-size: 16px;
        }

        input::placeholder {
            color: #8d8d8d;
        }

        input:focus {
            outline: none;
            border: 1px solid #ff2f6d;
        }

        button {
            height: 54px;
            border-radius: 999px;
            border: none;
            background: #ff2f6d;
            color: #000;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        .error {
            color: #ff4d6d;
            margin-bottom: 10px;
            text-align: center;
        }

        /* 📱 Мобілка */
        @media (max-width: 480px) {
            .login-box {
                padding: 28px 20px;
                border-radius: 20px;
            }

            .logo img {
                width: 100px;
            }
        }
    </style>
</head>
<body>

<div class="login-box">

    <div class="logo">
        <img src="{% static 'images/logo.svg' %}" alt="Logo">
    </div>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Логін" required>
        <input type="password" name="password" placeholder="Пароль" required>
        <button type="submit">Увійти</button>
    </form>

</div>

</body>
</html>
